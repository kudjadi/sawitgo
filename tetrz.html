<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>tetris · full mobile proporsional</title>
    <!-- tailwind + font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            min-height: 100dvh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
            padding: 8px;
            box-sizing: border-box;
        }
        canvas { 
            image-rendering: crisp-edges; 
            image-rendering: pixelated; 
            display: block; 
            width: 100%; 
            height: auto; 
            aspect-ratio: 1 / 2; /* 300:600 = 1:2 */
            max-width: 100%;
        }
        .btn-game { 
            transition: all 0.06s ease; 
            box-shadow: 0 5px 0 rgba(0,0,0,0.5); 
            touch-action: manipulation; 
            user-select: none;
            -webkit-touch-callout: none;
            font-weight: 700;
        }
        .btn-game:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.5); }
        
        /* next piece 4x4 grid */
        .next-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 3px; 
            aspect-ratio: 1/1; 
            width: 70px; 
            background: rgba(0,0,0,0.3); 
            padding: 6px; 
            border-radius: 16px;
        }
        .next-block { background-color: #334155; border-radius: 5px; }

        /* main row menggunakan flex dengan proporsi otomatis */
        .main-row {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 8px;
            width: 100%;
            max-width: 600px; /* agar tidak terlalu lebar di tablet */
            margin: 0 auto;
        }
        /* panel kiri & kanan lebar menyesuaikan, tapi konsisten */
        .control-panel {
            flex: 1 1 0;
            min-width: 80px;
            max-width: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            padding: 12px 8px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px -10px black;
        }
        /* canvas container fleksibel */
        .canvas-wrapper {
            flex: 0 0 auto;
            background: #1e293b;
            padding: 8px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 30px -12px black;
        }
        /* tombol dalam panel dibuat sama besar */
        .control-panel button {
            width: 100%;
            border-radius: 16px;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            padding: 0.6rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-width: 4px;
            border-style: solid;
        }
        .tiny-btn {
            font-size: 0.9rem !important;
            padding: 0.5rem 0 !important;
            border-bottom-width: 3px !important;
        }
        /* dash estetik */
        .dash-line {
            color: rgba(255,255,255,0.2);
            font-size: 2.5rem;
            line-height: 1;
            text-align: center;
            margin: -8px 0 -10px 0;
        }
    </style>
</head>
<body>
<div class="w-full flex flex-col items-center gap-2 max-w-2xl mx-auto">

    <!-- HEADER (proporsional) -->
    <div class="w-full flex items-center justify-between bg-white/5 backdrop-blur-md p-3 rounded-2xl border border-white/10 text-white shadow-xl">
        <div class="flex items-center gap-2">
            <div class="w-2 h-9 bg-lime-400 rounded-full"></div>
            <div>
                <div class="text-[0.65rem] text-white/40 tracking-wider">SKOR</div>
                <div id="scoreDisplay" class="text-3xl font-black text-lime-300 leading-none">0</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-white/40 text-sm hidden sm:inline">next</span>
            <div id="nextPieceContainer" class="next-grid">
                <!-- diisi js -->
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[0.65rem] text-white/40">BARIS</div>
            <div id="linesDisplay" class="text-2xl font-mono text-cyan-300">0</div>
        </div>
    </div>

    <!-- MAIN ROW dengan proporsi pas di hp -->
    <div class="main-row">

        <!-- PANEL KIRI (1 kolom) -->
        <div class="control-panel">
            <div class="dash-line">—</div>
            <button id="rotateLeftBtn" class="btn-game bg-amber-500/90 border-amber-800">↺</button>
            <button id="rotateRightBtn" class="btn-game bg-amber-500/90 border-amber-800">↻</button>
            <button id="moveLeftBtn" class="btn-game bg-sky-500/90 border-sky-800">←</button>
            <button id="hardDropBtn" class="btn-game bg-purple-500/90 border-purple-800 text-xl">⬇️⤓</button>
            <button id="pauseToggleBtn" class="tiny-btn bg-gray-600/70 border-gray-700 text-white/90">⏸️</button>
        </div>

        <!-- CANVAS (ukuran proporsional, mengecil/membesar sesuai layar) -->
        <div class="canvas-wrapper">
            <canvas id="tetrisCanvas" width="300" height="600" class="block"></canvas>
        </div>

        <!-- PANEL KANAN (1 kolom) -->
        <div class="control-panel">
            <div class="dash-line">—</div>
            <button id="rotateLeftBtn2" class="btn-game bg-amber-500/90 border-amber-800">↺</button>
            <button id="rotateRightBtn2" class="btn-game bg-amber-500/90 border-amber-800">↻</button>
            <button id="moveRightBtn" class="btn-game bg-sky-500/90 border-sky-800">→</button>
            <button id="hardDropBtn2" class="btn-game bg-purple-500/90 border-purple-800 text-xl">⬇️⤓</button>
            <button id="resetGameBtn" class="tiny-btn bg-red-800/70 border-red-950 text-white/90">⟲</button>
        </div>
    </div>

    <!-- hint (opsional) -->
    <div class="text-white/30 text-[0.7rem] flex gap-4 mt-0.5">
        <span>←→ geser · spasi hard drop · P jeda</span>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const linesSpan = document.getElementById('linesDisplay');
        const nextContainer = document.getElementById('nextPieceContainer');

        const COLS = 10, ROWS = 20;
        const BLOCK_SIZE = canvas.width / COLS; // 30px

        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0, lines = 0;
        let gameActive = true, paused = false;

        const PIECES = [
            { shape: [[1,1,1,1]], color: '#2ad4e3' },        // I
            { shape: [[1,1],[1,1]], color: '#f7e476' },      // O
            { shape: [[0,1,0],[1,1,1]], color: '#b784e0' },  // T
            { shape: [[0,1,1],[1,1,0]], color: '#6fcf97' },  // S
            { shape: [[1,1,0],[0,1,1]], color: '#e66767' },  // Z
            { shape: [[1,0,0],[1,1,1]], color: '#f0a55a' },  // L
            { shape: [[0,0,1],[1,1,1]], color: '#5a9cf0' }   // J
        ];

        let currentPiece = null;
        let nextPiece = null;

        function randomPiece() {
            const idx = Math.floor(Math.random() * PIECES.length);
            return { 
                ...PIECES[idx], 
                shape: PIECES[idx].shape.map(row => [...row]) 
            };
        }

        // Update next 4x4
        function updateNextDisplay() {
            if (!nextPiece) return;
            nextContainer.innerHTML = '';
            const shape = nextPiece.shape;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const block = document.createElement('div');
                    block.className = 'next-block';
                    if (r < shape.length && c < shape[0].length && shape[r][c] !== 0) {
                        block.style.backgroundColor = nextPiece.color;
                        block.style.boxShadow = 'inset 0 0 0 1px rgba(255,255,255,0.3)';
                    } else {
                        block.style.backgroundColor = '#1e293b';
                    }
                    nextContainer.appendChild(block);
                }
            }
        }

        function collision(shape, offX, offY) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c] !== 0) {
                        const boardX = offX + c;
                        const boardY = offY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!currentPiece) return;
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[0].length; c++) {
                    if (currentPiece.shape[r][c] !== 0) {
                        const boardX = currentPiece.x + c;
                        const boardY = currentPiece.y + r;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            clearFullRows();
            if (gameActive && !paused) spawnNewPiece();
        }

        function clearFullRows() {
            let rowsCleared = 0;
            for (let row = ROWS - 1; row >= 0; ) {
                if (board[row].every(cell => cell !== 0)) {
                    for (let r = row; r > 0; r--) board[r] = [...board[r-1]];
                    board[0] = Array(COLS).fill(0);
                    rowsCleared++;
                } else row--;
            }
            if (rowsCleared > 0) {
                lines += rowsCleared;
                if (rowsCleared === 1) score += 100;
                else if (rowsCleared === 2) score += 300;
                else if (rowsCleared === 3) score += 600;
                else if (rowsCleared >= 4) score += 1000;
                linesSpan.innerText = lines;
                scoreSpan.innerText = score;
            }
        }

        function spawnNewPiece() {
            if (!nextPiece) nextPiece = randomPiece();
            currentPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = randomPiece();
            updateNextDisplay();

            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameActive = false;
            }
        }

        function moveDown() {
            if (!gameActive || paused || !currentPiece) return false;
            if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++; return true;
            } else { lockPiece(); return false; }
        }
        function moveLeft() { if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x-1, currentPiece.y)) currentPiece.x--; }
        function moveRight() { if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x+1, currentPiece.y)) currentPiece.x++; }
        function rotatePiece(direction = 'right') {
            if (!gameActive || paused || !currentPiece) return;
            let rotated;
            if (direction === 'right') {
                rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
            } else {
                rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
                for (let i=0; i<2; i++) rotated = rotated[0].map((_, idx) => rotated.map(row => row[idx]).reverse());
            }
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            } else {
                if (!collision(rotated, currentPiece.x-1, currentPiece.y)) { currentPiece.shape = rotated; currentPiece.x--; }
                else if (!collision(rotated, currentPiece.x+1, currentPiece.y)) { currentPiece.shape = rotated; currentPiece.x++; }
            }
        }
        function hardDrop() {
            if (!gameActive || paused || !currentPiece) return;
            while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) currentPiece.y++;
            lockPiece();
        }

        function resetGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0; lines = 0; gameActive = true; paused = false;
            scoreSpan.innerText = '0'; linesSpan.innerText = '0';
            nextPiece = randomPiece(); updateNextDisplay();
            spawnNewPiece();
        }

        // Gambar
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] !== 0) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(col*BLOCK_SIZE+3, row*BLOCK_SIZE+3, BLOCK_SIZE-7, BLOCK_SIZE-7);
                    } else {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                    }
                }
            }
            if (currentPiece && gameActive) {
                for (let r=0; r<currentPiece.shape.length; r++) {
                    for (let c=0; c<currentPiece.shape[0].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const x = (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            ctx.fillStyle = currentPiece.color;
                            ctx.fillRect(x, y, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(x+4, y+4, BLOCK_SIZE-9, BLOCK_SIZE-9);
                        }
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();

        setInterval(() => { if (gameActive && !paused) moveDown(); }, 430);

        // Init
        nextPiece = randomPiece(); updateNextDisplay();
        spawnNewPiece();

        // Semua tombol (kiri & kanan)
        const actions = [
            ['moveLeftBtn', moveLeft], ['moveLeftBtn2', moveLeft],
            ['moveRightBtn', moveRight], ['moveRightBtn2', moveRight],
            ['rotateLeftBtn', ()=>rotatePiece('left')], ['rotateLeftBtn2', ()=>rotatePiece('left')],
            ['rotateRightBtn', ()=>rotatePiece('right')], ['rotateRightBtn2', ()=>rotatePiece('right')],
            ['hardDropBtn', hardDrop], ['hardDropBtn2', hardDrop],
            ['pauseToggleBtn', ()=>{ if(gameActive) paused = !paused; }],
            ['resetGameBtn', resetGame]
        ];
        actions.forEach(([id, fn]) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', (e) => { e.preventDefault(); fn(); });
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (!gameActive) return;
            e.preventDefault();
            if (key === 'ArrowLeft') moveLeft();
            else if (key === 'ArrowRight') moveRight();
            else if (key === 'ArrowDown') moveDown();
            else if (key === 'ArrowUp') rotatePiece('right');
            else if (key === ' ' || key === 'Space') hardDrop();
            else if (key === 'p' || key === 'P') paused = !paused;
        });
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        }, {passive: false});
    })();
</script>
</body>
</html>
