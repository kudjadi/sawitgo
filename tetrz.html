<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>tetris · animasi blok + auto reset</title>
    <!-- tailwind + font inter -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            margin: 0;
            transition: background 0.3s ease;
        }
        body.theme-light {
            background: radial-gradient(circle at top, #f0f4fa, #cbd5e1);
        }
        body.theme-light .stats-header,
        body.theme-light .control-panel,
        body.theme-light .canvas-holder {
            background: rgba(255,255,255,0.6);
            border-color: rgba(0,0,0,0.1);
        }
        body.theme-light .stats-header div,
        body.theme-light .hint-text {
            color: #1e293b;
        }
        body.theme-light .text-white\/40 {
            color: #334155cc;
        }

        canvas { 
            image-rendering: crisp-edges; 
            image-rendering: pixelated; 
            width: 100%; 
            height: auto; 
            display: block;
            border-radius: 16px;
            background: #0b1120;
            transition: background 0.2s;
        }
        .btn-game { 
            transition: all 0.06s ease; 
            box-shadow: 0 5px 0 rgba(0,0,0,0.5); 
            touch-action: manipulation; 
            user-select: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            width: 100%;
        }
        .btn-game:active { 
            transform: translateY(4px); 
            box-shadow: 0 1px 0 rgba(0,0,0,0.5); 
        }
        .next-mini-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 3px; 
            aspect-ratio: 1/1; 
            width: 100%;
            max-width: 70px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
        }
        .next-block { 
            background-color: #334155; 
            border-radius: 5px; 
            width: 100%;
            aspect-ratio: 1/1;
            transition: transform 0.1s;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            gap: 8px;
        }
        .row-main {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-items: stretch;
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 12px 8px;
            width: 85px;
            flex-shrink: 0;
        }
        @media (min-width: 420px) {
            .control-panel { width: 100px; padding: 14px 10px; }
        }
        .canvas-holder {
            flex: 1;
            display: flex;
            justify-content: center;
            background: #111827;
            border-radius: 28px;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 30px -10px black;
        }
        .stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 16px;
            color: white;
            width: 100%;
        }
        .hint-text {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            text-align: center;
            margin-top: 6px;
        }
        @keyframes blinkBlock {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); background-color: #ffffff !important; }
            100% { opacity: 1; transform: scale(1); }
        }
        .block-animate {
            animation: blinkBlock 0.2s ease-in-out 2;
        }
        .highscore-badge {
            background: #fbbf24;
            color: black;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: bold;
            margin-left: 6px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">

    <!-- HEADER: skor, next, baris + high score & tombol tema -->
    <div class="stats-header">
        <div class="flex items-center gap-2">
            <div class="w-2 h-8 bg-lime-400 rounded-full"></div>
            <div>
                <div class="text-[10px] text-white/40 leading-tight flex items-center">
                    SKOR 
                    <span id="highScoreBadge" class="highscore-badge hidden">🏆</span>
                </div>
                <div id="scoreDisplay" class="text-2xl sm:text-3xl font-black text-lime-300 leading-none">0</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-white/40 text-xs sm:text-sm">next</span>
            <div id="nextPieceContainer" class="next-mini-grid">
                <!-- diisi js -->
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
                <div class="next-block"></div><div class="next-block"></div><div class="next-block"></div><div class="next-block"></div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="text-right mr-1">
                <div class="text-[10px] text-white/40">BARIS</div>
                <div id="linesDisplay" class="text-xl sm:text-2xl font-mono text-cyan-300">0</div>
            </div>
            <!-- tombol ganti tema -->
            <button id="themeToggleBtn" class="bg-white/10 hover:bg-white/20 text-white rounded-full w-8 h-8 flex items-center justify-center text-lg border border-white/20">🎨</button>
        </div>
    </div>

    <!-- MAIN ROW: kontrol kiri + canvas + kontrol kanan -->
    <div class="row-main">
        <!-- PANEL KIRI (1 KOLOM) -->
        <div class="control-panel">
            <div class="text-white/20 text-3xl text-center leading-none -mt-2">—</div>
            <button id="pauseToggleBtn" class="btn-game text-sm bg-gray-600/70 active:bg-gray-500 py-3 rounded-xl border-b-4 border-gray-700 text-white/90">⏸Pause</button>
            <button id="rotateLeftBtn" class="btn-game bg-amber-500/90 active:bg-amber-400 text-3xl py-3 rounded-2xl border-b-4 border-amber-800">↺</button>
            <button id="hardDropBtn" class="btn-game bg-purple-500/90 active:bg-purple-400 text-xl py-3 rounded-2xl border-b-4 border-purple-800">Dash</button>
            <button id="moveLeftBtn" class="btn-game bg-sky-500/90 active:bg-sky-400 text-3xl py-3 rounded-2xl border-b-4 border-sky-800">←</button>
        </div>

        <!-- CANVAS -->
        <div class="canvas-holder">
            <canvas id="tetrisCanvas" width="300" height="600" style="max-width: 100%; height: auto; aspect-ratio: 1/2;"></canvas>
        </div>

        <!-- PANEL KANAN (1 KOLOM) -->
        <div class="control-panel">
            <div class="text-white/20 text-3xl text-center leading-none -mt-2">—</div>
            <button id="resetGameBtn" class="btn-game text-sm bg-red-800/70 active:bg-red-700 py-3 rounded-xl border-b-4 border-red-950">Reset</button>
            <button id="hardDropBtn2" class="btn-game bg-purple-500/90 active:bg-purple-400 text-xl py-3 rounded-2xl border-b-4 border-purple-800">Dash</button>
            <button id="rotateRightBtn" class="btn-game bg-amber-500/90 active:bg-amber-400 text-3xl py-3 rounded-2xl border-b-4 border-amber-800">↻</button>
            <button id="moveRightBtn" class="btn-game bg-sky-500/90 active:bg-sky-400 text-3xl py-3 rounded-2xl border-b-4 border-sky-800">→</button>
        </div>
    </div>

    <!-- HINT MOBILE + combo info -->
    <div class="hint-text flex flex-wrap justify-center gap-3">
        <span>← → geser</span> <span id="comboDisplay" class="text-yellow-300 font-bold">🔥 0x</span> <span>↻ putar</span> <span>⏸️ jeda</span>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const linesSpan = document.getElementById('linesDisplay');
        const nextContainer = document.getElementById('nextPieceContainer');
        const comboDisplay = document.getElementById('comboDisplay');
        const highScoreBadge = document.getElementById('highScoreBadge');

        // konstanta game
        const COLS = 10, ROWS = 20;
        const BLOCK_SIZE = canvas.width / COLS; // 30px

        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0, lines = 0;
        let gameActive = true, paused = false;

        // --- FITUR BARU: SKOR + KOMBO ---
        let combo = 0;
        let lastClearTime = 0;
        const COMBO_WINDOW = 2000; // 2 detik

        // --- HIGH SCORE (localStorage) ---
        let highScore = localStorage.getItem('tetrisHighScore') ? parseInt(localStorage.getItem('tetrisHighScore')) : 0;
        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tetrisHighScore', highScore);
                highScoreBadge.classList.remove('hidden');
                highScoreBadge.innerText = `🏆 ${highScore}`;
            } else {
                if (highScore > 0) {
                    highScoreBadge.classList.remove('hidden');
                    highScoreBadge.innerText = `🏆 ${highScore}`;
                } else {
                    highScoreBadge.classList.add('hidden');
                }
            }
        }

        // --- TEMA WARNA ---
        let currentTheme = 'dark';
        function toggleTheme() {
            if (document.body.classList.contains('theme-light')) {
                document.body.classList.remove('theme-light');
                currentTheme = 'dark';
            } else {
                document.body.classList.add('theme-light');
                currentTheme = 'light';
            }
        }
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

        // --- ANIMASI PER BLOK SAAT BARIS PENUH ---
        function animateFullRows(rows) {
            // rows adalah array index baris yang penuh
            if (!rows.length) return;
            
            // simpan board sementara
            const originalBoard = board.map(row => [...row]);
            
            // animasi dengan interval
            let blinkCount = 0;
            const maxBlinks = 4; // 2 kali kedip (karena interval 100ms * 4 = 400ms)
            
            const interval = setInterval(() => {
                // toggle antara menampilkan board asli dan board dengan blok putih
                if (blinkCount % 2 === 0) {
                    // gambar board dengan efek putih pada baris yang penuh
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    for (let row = 0; row < ROWS; row++) {
                        for (let col = 0; col < COLS; col++) {
                            if (originalBoard[row][col] !== 0) {
                                // jika baris ini termasuk yang penuh, warnai putih
                                if (rows.includes(row)) {
                                    ctx.fillStyle = '#ffffff';
                                } else {
                                    ctx.fillStyle = originalBoard[row][col];
                                }
                                ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                                ctx.fillRect(col*BLOCK_SIZE+3, row*BLOCK_SIZE+3, BLOCK_SIZE-7, BLOCK_SIZE-7);
                            } else {
                                ctx.fillStyle = '#1e293b';
                                ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            }
                        }
                    }
                } else {
                    // gambar board normal (tanpa efek)
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    for (let row = 0; row < ROWS; row++) {
                        for (let col = 0; col < COLS; col++) {
                            if (originalBoard[row][col] !== 0) {
                                ctx.fillStyle = originalBoard[row][col];
                                ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                                ctx.fillRect(col*BLOCK_SIZE+3, row*BLOCK_SIZE+3, BLOCK_SIZE-7, BLOCK_SIZE-7);
                            } else {
                                ctx.fillStyle = '#1e293b';
                                ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            }
                        }
                    }
                }
                
                blinkCount++;
                
                if (blinkCount >= maxBlinks) {
                    clearInterval(interval);
                    // setelah animasi selesai, hapus baris yang penuh
                    removeFullRows(rows);
                }
            }, 100);
        }

        function removeFullRows(rows) {
            // hapus baris dari board (dari bawah ke atas)
            for (let i = rows.length - 1; i >= 0; i--) {
                const row = rows[i];
                for (let r = row; r > 0; r--) {
                    board[r] = [...board[r-1]];
                }
                board[0] = Array(COLS).fill(0);
            }
            
            // update skor setelah penghapusan
            let rowsCleared = rows.length;
            const now = Date.now();
            if (now - lastClearTime < COMBO_WINDOW) {
                combo++;
            } else {
                combo = 1;
            }
            lastClearTime = now;
            comboDisplay.innerText = `🔥 ${combo}x`;

            let basePoints = 0;
            if (rowsCleared === 1) basePoints = 100;
            else if (rowsCleared === 2) basePoints = 300;
            else if (rowsCleared === 3) basePoints = 600;
            else if (rowsCleared >= 4) basePoints = 1000;

            let comboBonus = Math.floor(basePoints * 0.2 * (combo - 1));
            let totalPoints = basePoints + comboBonus;

            score += totalPoints;
            lines += rowsCleared;

            linesSpan.innerText = lines;
            scoreSpan.innerText = score;
            updateHighScore();
        }

        const PIECES = [
            { shape: [[1,1,1,1]], color: '#2ad4e3' },        // I
            { shape: [[1,1],[1,1]], color: '#f7e476' },      // O
            { shape: [[0,1,0],[1,1,1]], color: '#b784e0' },  // T
            { shape: [[0,1,1],[1,1,0]], color: '#6fcf97' },  // S
            { shape: [[1,1,0],[0,1,1]], color: '#e66767' },  // Z
            { shape: [[1,0,0],[1,1,1]], color: '#f0a55a' },  // L
            { shape: [[0,0,1],[1,1,1]], color: '#5a9cf0' }   // J
        ];

        let currentPiece = null;
        let nextPiece = null;

        function randomPiece() {
            const idx = Math.floor(Math.random() * PIECES.length);
            return { 
                ...PIECES[idx], 
                shape: PIECES[idx].shape.map(row => [...row]) 
            };
        }

        function updateNextDisplay() {
            if (!nextPiece) return;
            nextContainer.innerHTML = '';
            const shape = nextPiece.shape;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const block = document.createElement('div');
                    block.className = 'next-block';
                    if (r < shape.length && c < shape[0].length && shape[r][c] !== 0) {
                        block.style.backgroundColor = nextPiece.color;
                        block.style.boxShadow = 'inset 0 0 0 1px rgba(255,255,255,0.3)';
                    } else {
                        block.style.backgroundColor = '#1e293b';
                    }
                    nextContainer.appendChild(block);
                }
            }
        }

        function collision(shape, offX, offY) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c] !== 0) {
                        const boardX = offX + c;
                        const boardY = offY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!currentPiece) return;
            
            // tempelkan piece ke board
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[0].length; c++) {
                    if (currentPiece.shape[r][c] !== 0) {
                        const boardX = currentPiece.x + c;
                        const boardY = currentPiece.y + r;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            
            // cek baris penuh
            checkFullRows();
            
            if (gameActive && !paused) spawnNewPiece();
        }

        function checkFullRows() {
            let fullRows = [];
            for (let row = 0; row < ROWS; row++) {
                if (board[row].every(cell => cell !== 0)) {
                    fullRows.push(row);
                }
            }
            
            if (fullRows.length > 0) {
                // auto reset jika kolom penuh (baris paling atas penuh)
                if (fullRows.includes(0)) {
                    // game over, auto reset setelah animasi
                    setTimeout(() => {
                        resetGame();
                    }, 500);
                }
                
                // animasi untuk baris yang penuh
                animateFullRows(fullRows);
            } else {
                // tidak ada baris penuh, reset combo
                combo = 0;
                comboDisplay.innerText = `🔥 0x`;
            }
        }

        function spawnNewPiece() {
            if (!nextPiece) nextPiece = randomPiece();
            currentPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = randomPiece();
            updateNextDisplay();

            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameActive = false;
                // auto reset saat game over
                setTimeout(() => {
                    resetGame();
                }, 500);
            }
        }

        function moveDown() {
            if (!gameActive || paused || !currentPiece) return false;
            if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++; return true;
            } else { lockPiece(); return false; }
        }
        
        function moveLeft() { 
            if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x-1, currentPiece.y)) 
                currentPiece.x--; 
        }
        
        function moveRight() { 
            if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x+1, currentPiece.y)) 
                currentPiece.x++; 
        }
        
        function rotatePiece(direction = 'right') {
            if (!gameActive || paused || !currentPiece) return;
            let rotated;
            if (direction === 'right') {
                rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
            } else {
                rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
                for (let i=0; i<2; i++) rotated = rotated[0].map((_, idx) => rotated.map(row => row[idx]).reverse());
            }
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            } else {
                if (!collision(rotated, currentPiece.x-1, currentPiece.y)) { 
                    currentPiece.shape = rotated; 
                    currentPiece.x--; 
                }
                else if (!collision(rotated, currentPiece.x+1, currentPiece.y)) { 
                    currentPiece.shape = rotated; 
                    currentPiece.x++; 
                }
            }
        }
        
        function hardDrop() {
            if (!gameActive || paused || !currentPiece) return;
            while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) currentPiece.y++;
            lockPiece();
        }

        function resetGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0; lines = 0; gameActive = true; paused = false; combo = 0;
            scoreSpan.innerText = '0'; linesSpan.innerText = '0';
            comboDisplay.innerText = '🔥 0x';
            nextPiece = randomPiece(); updateNextDisplay();
            spawnNewPiece();
            updateHighScore();
        }

        // draw
        function draw() {
            if (!gameActive) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] !== 0) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(col*BLOCK_SIZE+3, row*BLOCK_SIZE+3, BLOCK_SIZE-7, BLOCK_SIZE-7);
                    } else {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                    }
                }
            }
            
            if (currentPiece && gameActive) {
                for (let r=0; r<currentPiece.shape.length; r++) {
                    for (let c=0; c<currentPiece.shape[0].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const x = (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            ctx.fillStyle = currentPiece.color;
                            ctx.fillRect(x, y, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(x+4, y+4, BLOCK_SIZE-9, BLOCK_SIZE-9);
                        }
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();

        // gravity
        setInterval(() => { if (gameActive && !paused) moveDown(); }, 430);

        // init
        nextPiece = randomPiece(); updateNextDisplay();
        spawnNewPiece();
        updateHighScore();

        // mapping tombol
        const actions = [
            ['moveLeftBtn', moveLeft],
            ['moveRightBtn', moveRight],
            ['rotateLeftBtn', ()=>rotatePiece('left')],
            ['rotateRightBtn', ()=>rotatePiece('right')],
            ['hardDropBtn', hardDrop],
            ['hardDropBtn2', hardDrop],
            ['pauseToggleBtn', ()=>{ if(gameActive) paused = !paused; }],
            ['resetGameBtn', resetGame]
        ];
        
        actions.forEach(([id, fn]) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', (e) => { e.preventDefault(); fn(); });
        });

        // keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (!gameActive) return;
            
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            
            if (key === 'ArrowLeft') moveLeft();
            else if (key === 'ArrowRight') moveRight();
            else if (key === 'ArrowDown') moveDown();
            else if (key === 'ArrowUp') rotatePiece('right');
            else if (key === ' ' || key === 'Space') hardDrop();
            else if (key === 'p' || key === 'P') paused = !paused;
        });
    })();
</script>
</body>
</html>
