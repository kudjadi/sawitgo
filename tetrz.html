<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tetris · tata ulang (kiri: ←↻⟲ | kanan: →↺⏸️⚡)</title>
    <!-- tailwind + inter -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
        .game-panel { box-shadow: 0 20px 32px -12px rgba(0,0,0,0.7); }
        .btn-tetris { transition: all 0.06s ease-out; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .btn-tetris:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
        .next-piece-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; aspect-ratio: 1/1; }
        .next-tile { background-color: #1e293b; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
        .next-fill { background-color: #6ee7b7; border-radius: 5px; box-shadow: 0 0 0 1px #0f172a; }
    </style>
</head>
<body class="bg-[#0b1120] min-h-screen flex items-center justify-center p-5 font-sans">

    <!-- container utama: grid proporsional dengan tiga baris: 
         1. score + next (di atas)
         2. kontrol kiri | kanvas | kontrol kanan 
         3. optional footer tip (tidak mengganggu)
    -->
    <div class="max-w-5xl w-full flex flex-col gap-4">
        
        <!-- BARIS ATAS: skor & next piece -->
        <div class="flex items-center justify-between gap-4 bg-white/[0.03] backdrop-blur-sm p-4 rounded-2xl border border-white/5">
            <!-- skor kiri -->
            <div class="flex items-center gap-8">
                <div class="bg-black/40 py-2 px-6 rounded-xl text-center">
                    <div class="text-indigo-200/60 text-[0.7rem] uppercase tracking-wider">Skor</div>
                    <div id="scoreDisplay" class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-lime-300 to-emerald-300">0</div>
                </div>
                <div class="bg-black/40 py-2 px-6 rounded-xl text-center">
                    <div class="text-indigo-200/60 text-[0.7rem] uppercase tracking-wider">Baris</div>
                    <div id="linesDisplay" class="text-3xl font-bold text-cyan-300">0</div>
                </div>
            </div>
            <!-- next piece (kotak 4x4) -->
            <div class="flex items-center gap-3 bg-black/40 py-2 px-5 rounded-xl">
                <span class="text-white/40 text-sm font-medium">NEXT</span>
                <div id="nextPieceContainer" class="next-piece-grid w-20 h-20">
                    <!-- diisi 16 kotak, yg bukan nol diberi warna nanti melalui js -->
                    <div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div>
                    <div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div>
                    <div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div>
                    <div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div><div class="next-tile"></div>
                </div>
            </div>
        </div>

        <!-- BARIS TENGAH: tiga kolom (kiri | kanvas | kanan) proporsional -->
        <div class="flex flex-wrap md:flex-nowrap gap-3 items-stretch">
            
            <!-- KIRI: tombol arah kiri, rotate, reset, dash (⇼) untuk hard drop? dash = hard drop sesuai permintaan) -->
            <div class="w-full md:w-44 flex flex-col justify-between bg-white/5 p-4 rounded-2xl border border-white/10 shadow-xl">
                <div class="space-y-3">
                    <div class="text-white/30 text-[0.6rem] font-mono text-center">◀ KONTROL KIRI</div>
                    <!-- arah kiri (←) besar -->
                    <button id="moveLeftBtn" class="btn-tetris w-full bg-sky-500 hover:bg-sky-400 text-white text-3xl py-5 rounded-xl border-b-4 border-sky-800 flex items-center justify-center">←</button>
                    
                    <!-- rotate kiri & reset berjejer (dua tombol) -->
                    <div class="grid grid-cols-2 gap-2">
                        <button id="rotateLeftBtn" class="btn-tetris bg-amber-500 hover:bg-amber-400 text-white text-2xl py-4 rounded-xl border-b-4 border-amber-800 flex items-center justify-center">↺</button>
                        <button id="resetGameBtn" class="btn-tetris bg-red-700 hover:bg-red-600 text-white text-xl py-4 rounded-xl border-b-4 border-red-900 flex items-center justify-center">⟲</button>
                    </div>
                    
                    <!-- dash / hard drop (simbol ⤓ atau tanda) sesuai "dash" -->
                    <button id="hardDropBtnLeft" class="btn-tetris w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white text-2xl py-5 rounded-xl border-b-4 border-fuchsia-900 flex items-center justify-center gap-1">⤓ DASH</button>
                </div>
                <!-- ruang bawah tipis (optional) -->
                <div class="text-white/20 text-[0.6rem] text-center mt-2">←↻⟲⚡</div>
            </div>

            <!-- TENGAH: canvas game -->
            <div class="flex-shrink-0 flex flex-col items-center">
                <div class="game-panel bg-gray-900 p-3 rounded-3xl border border-white/20">
                    <canvas id="tetrisCanvas" width="300" height="600" class="block rounded-xl bg-gray-950 shadow-2xl"></canvas>
                </div>
                <!-- status minimalis -->
                <div class="mt-2 bg-black/30 px-5 py-1.5 rounded-full text-white/60 text-xs flex gap-3">
                    <span id="gameState" class="text-emerald-300">bermain</span>
                    <span>⬆️⬇️ putar/geser</span>
                </div>
            </div>

            <!-- KANAN: arah kanan, rotate kanan, pause, dash -->
            <div class="w-full md:w-44 flex flex-col justify-between bg-white/5 p-4 rounded-2xl border border-white/10 shadow-xl">
                <div class="space-y-3">
                    <div class="text-white/30 text-[0.6rem] font-mono text-center">KONTROL KANAN ▶</div>
                    <!-- arah kanan (→) besar -->
                    <button id="moveRightBtn" class="btn-tetris w-full bg-sky-500 hover:bg-sky-400 text-white text-3xl py-5 rounded-xl border-b-4 border-sky-800 flex items-center justify-center">→</button>
                    
                    <!-- rotate kanan & pause sejajar -->
                    <div class="grid grid-cols-2 gap-2">
                        <button id="rotateRightBtn" class="btn-tetris bg-amber-500 hover:bg-amber-400 text-white text-2xl py-4 rounded-xl border-b-4 border-amber-800 flex items-center justify-center">↻</button>
                        <button id="pauseToggleBtn" class="btn-tetris bg-gray-600 hover:bg-gray-500 text-white text-xl py-4 rounded-xl border-b-4 border-gray-800 flex items-center justify-center">⏸️</button>
                    </div>
                    
                    <!-- dash kanan (hard drop) -->
                    <button id="hardDropBtnRight" class="btn-tetris w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white text-2xl py-5 rounded-xl border-b-4 border-fuchsia-900 flex items-center justify-center gap-1">⤓ DASH</button>
                </div>
                <div class="text-white/20 text-[0.6rem] text-center mt-2">→↻⏸️⚡</div>
            </div>
        </div>

        <!-- footer hint tipis (ga penting) -->
        <div class="text-white/20 text-[0.65rem] text-center tracking-wider">← ↻  ⟲  |  DASH  |  → ↻  ⏸️       [spasi: hard drop]</div>
    </div>

    <script>
        (function() {
            // ---------- TETRIS CORE (sama, tapi tambah render next piece) ----------
            const canvas = document.getElementById('tetrisCanvas');
            const ctx = canvas.getContext('2d');

            const scoreSpan = document.getElementById('scoreDisplay');
            const linesSpan = document.getElementById('linesDisplay');
            const gameStateSpan = document.getElementById('gameState');
            const nextContainer = document.getElementById('nextPieceContainer');

            const COLS = 10, ROWS = 20;
            const BLOCK_SIZE = canvas.width / COLS; // 30px

            let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            let score = 0, lines = 0;
            let gameActive = true, paused = false;

            const PIECES = [
                { // I
                    shape: [[1,1,1,1]],
                    color: '#2ad4e3' 
                },
                { // O
                    shape: [[1,1],[1,1]],
                    color: '#f7e476' 
                },
                { // T
                    shape: [[0,1,0],[1,1,1]],
                    color: '#b784e0' 
                },
                { // S
                    shape: [[0,1,1],[1,1,0]],
                    color: '#6fcf97' 
                },
                { // Z
                    shape: [[1,1,0],[0,1,1]],
                    color: '#e66767' 
                },
                { // L
                    shape: [[1,0,0],[1,1,1]],
                    color: '#f0a55a' 
                },
                { // J
                    shape: [[0,0,1],[1,1,1]],
                    color: '#5a9cf0' 
                }
            ];

            let currentPiece = null;
            let nextPiece = null;

            function randomPiece() {
                const idx = Math.floor(Math.random() * PIECES.length);
                return { ...PIECES[idx], shape: PIECES[idx].shape.map(r => [...r]) };
            }

            function spawnNewPiece() {
                if (!nextPiece) nextPiece = randomPiece();
                currentPiece = {
                    shape: nextPiece.shape.map(r => [...r]),
                    color: nextPiece.color,
                    x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                    y: 0
                };
                nextPiece = randomPiece();
                updateNextDisplay();      // <-- perbarui kotak next

                if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                    gameActive = false;
                    gameStateSpan.innerText = 'game over';
                }
            }

            function updateNextDisplay() {
                // bersihkan container
                const tiles = nextContainer.children; // HTMLCollection
                for (let i = 0; i < tiles.length; i++) {
                    tiles[i].className = 'next-tile'; // reset
                }
                if (!nextPiece) return;

                // gambarkan shape nextPiece (max 4x4) di grid 4x4
                const shape = nextPiece.shape;
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[0].length; c++) {
                        if (shape[r][c] !== 0) {
                            const idx = r * 4 + c; // karena 4 kolom
                            if (idx < 16) {
                                tiles[idx].classList.add('next-fill');
                                // pake warna sesuai piece, tapi sederhana kita set bg
                                tiles[idx].style.backgroundColor = nextPiece.color;
                                tiles[idx].style.boxShadow = '0 0 0 1px #0f172a';
                            }
                        }
                    }
                }
            }

            function collision(shape, offX, offY) {
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[0].length; c++) {
                        if (shape[r][c]) {
                            const boardX = offX + c, boardY = offY + r;
                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                            if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                        }
                    }
                }
                return false;
            }

            function lockPiece() {
                if (!currentPiece) return;
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[0].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const boardX = currentPiece.x + c, boardY = currentPiece.y + r;
                            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                                board[boardY][boardX] = currentPiece.color;
                            }
                        }
                    }
                }
                clearFullRows();
                if (gameActive && !paused) spawnNewPiece();
            }

            function clearFullRows() {
                let rowsCleared = 0;
                for (let row = ROWS - 1; row >= 0; ) {
                    if (board[row].every(cell => cell !== 0)) {
                        for (let r = row; r > 0; r--) board[r] = [...board[r-1]];
                        board[0] = Array(COLS).fill(0);
                        rowsCleared++;
                    } else row--;
                }
                if (rowsCleared > 0) {
                    lines += rowsCleared;
                    score += rowsCleared === 1 ? 100 : rowsCleared === 2 ? 300 : rowsCleared === 3 ? 600 : 1000;
                    linesSpan.innerText = lines;
                    scoreSpan.innerText = score;
                }
            }

            function moveDown() {
                if (!gameActive || paused || !currentPiece) return false;
                if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                    currentPiece.y++; return true;
                } else { lockPiece(); return false; }
            }

            function moveLeft() { if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x - 1, currentPiece.y)) currentPiece.x--; }
            function moveRight() { if (gameActive && !paused && currentPiece && !collision(currentPiece.shape, currentPiece.x + 1, currentPiece.y)) currentPiece.x++; }

            function rotatePiece(direction = 'right') {
                if (!gameActive || paused || !currentPiece) return;
                let rotated;
                if (direction === 'right') {
                    rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
                } else { // left = 3x right
                    rotated = currentPiece.shape[0].map((_, idx) => currentPiece.shape.map(row => row[idx]).reverse());
                    for (let i = 0; i < 2; i++) {
                        rotated = rotated[0].map((_, idx) => rotated.map(row => row[idx]).reverse());
                    }
                }
                if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                    currentPiece.shape = rotated;
                } else { // wallkick sederhana
                    if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
                        currentPiece.shape = rotated; currentPiece.x--;
                    } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
                        currentPiece.shape = rotated; currentPiece.x++;
                    }
                }
            }

            function hardDrop() {
                if (!gameActive || paused || !currentPiece) return;
                while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) currentPiece.y++;
                lockPiece();
            }

            function resetGame() {
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0; lines = 0; gameActive = true; paused = false;
                gameStateSpan.innerText = 'bermain';
                scoreSpan.innerText = '0'; linesSpan.innerText = '0';
                nextPiece = randomPiece();
                spawnNewPiece();
                updateNextDisplay();
            }

            // ---- render ----
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#0b0f17';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (board[row][col] !== 0) {
                            ctx.fillStyle = board[row][col];
                            ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        } else {
                            ctx.fillStyle = '#1e2537';
                            ctx.fillRect(col*BLOCK_SIZE, row*BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        }
                    }
                }
                if (currentPiece && gameActive) {
                    for (let r=0; r<currentPiece.shape.length; r++) {
                        for (let c=0; c<currentPiece.shape[0].length; c++) {
                            if (currentPiece.shape[r][c]) {
                                const x = (currentPiece.x + c) * BLOCK_SIZE;
                                const y = (currentPiece.y + r) * BLOCK_SIZE;
                                ctx.fillStyle = currentPiece.color;
                                ctx.fillRect(x, y, BLOCK_SIZE-1, BLOCK_SIZE-1);
                                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                                ctx.fillRect(x+3, y+3, BLOCK_SIZE-8, BLOCK_SIZE-8);
                            }
                        }
                    }
                }
                // grid
                ctx.strokeStyle = '#2f3a5a';
                ctx.lineWidth = 0.5;
                for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*BLOCK_SIZE,0); ctx.lineTo(i*BLOCK_SIZE,canvas.height); ctx.stroke(); }
                for (let i=0;i<=ROWS;i++) { ctx.beginPath(); ctx.moveTo(0,i*BLOCK_SIZE); ctx.lineTo(canvas.width,i*BLOCK_SIZE); ctx.stroke(); }
            }

            // game loop
            let lastTick = 0;
            function gameLoop(now) {
                if (!lastTick || now - lastTick >= 450) {
                    lastTick = now;
                    if (gameActive && !paused) moveDown();
                }
                draw();
                requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);

            // initial
            nextPiece = randomPiece();
            spawnNewPiece();

            // ---- attach events ----
            function attach(btnId, fn) {
                const el = document.getElementById(btnId);
                if (el) el.addEventListener('click', (e) => { e.preventDefault(); fn(); });
            }

            // tombol kiri
            attach('moveLeftBtn', moveLeft);
            attach('rotateLeftBtn', () => rotatePiece('left'));
            attach('resetGameBtn', resetGame);
            attach('hardDropBtnLeft', hardDrop);

            // tombol kanan
            attach('moveRightBtn', moveRight);
            attach('rotateRightBtn', () => rotatePiece('right'));
            attach('pauseToggleBtn', () => { if (!gameActive) return; paused = !paused; gameStateSpan.innerText = paused ? 'paused' : 'bermain'; });
            attach('hardDropBtnRight', hardDrop);

            // keyboard
            window.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                const key = e.key;
                if (key === 'ArrowLeft') { moveLeft(); e.preventDefault(); }
                else if (key === 'ArrowRight') { moveRight(); e.preventDefault(); }
                else if (key === 'ArrowDown') { moveDown(); e.preventDefault(); }
                else if (key === 'ArrowUp') { rotatePiece('right'); e.preventDefault(); }
                else if (key === ' ' || key === 'Space') { hardDrop(); e.preventDefault(); }
                else if (key === 'p' || key === 'P') { paused = !paused; gameStateSpan.innerText = paused ? 'paused' : 'bermain'; e.preventDefault(); }
            });
            window.addEventListener('keydown', (e) => { if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); }, {passive:false});

            // supaya next display ikut update tiap kali ganti piece (juga dipanggil spawn)
            // override lockPiece sedikit (panggil update)
            const originalSpawn = spawnNewPiece;
            spawnNewPiece = function() {
                originalSpawn();
                updateNextDisplay();
            };
            // patch juga reset
            const originalReset = resetGame;
            resetGame = function() { originalReset(); updateNextDisplay(); };
            // reassign
            spawnNewPiece = spawnNewPiece.bind(this);
            resetGame = resetGame.bind(this);
            // tapi karena panggil internal kita ubah referensi, gampangnya panggil manual setelah spawn awal
            // refresh manual:
            setTimeout(() => updateNextDisplay(), 10);
        })();
    </script>
</body>
</html>
